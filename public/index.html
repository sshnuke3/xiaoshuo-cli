<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨线 · 小说工坊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark">墨</span>
        <div><strong>墨线</strong><small>小说工坊</small></div>
        <button class="icon-btn mobile-close" id="closeSidebar" title="关闭侧栏"><i data-lucide="x"></i></button>
      </div>
      <button class="new-book" id="newProject"><i data-lucide="plus"></i><span>新建小说</span></button>
      <div class="sidebar-label">作品</div>
      <nav class="project-list" id="projectList"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-action" id="openSettings"><i data-lucide="settings-2"></i><span>模型设置</span><b id="modelDot"></b></button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-btn" id="openSidebar" title="打开侧栏"><i data-lucide="menu"></i></button>
        <div id="breadcrumb" class="breadcrumb">创作台</div>
        <div class="top-actions" id="topActions"></div>
      </header>
      <div class="workspace" id="workspace"></div>
    </main>
  </div>

  <dialog id="settingsDialog" class="dialog">
    <form method="dialog" class="dialog-panel" id="settingsForm">
      <div class="dialog-head">
        <div><h2>大模型连接</h2><p>兼容 OpenAI Chat Completions 接口</p></div>
        <button type="button" class="icon-btn" id="closeSettings" title="关闭"><i data-lucide="x"></i></button>
      </div>
      <div class="form-grid single">
        <label>接口地址<input name="base_url" required placeholder="https://api.openai.com/v1"></label>
        <label>API Key<input name="api_key" type="password" placeholder="已保存则留空"></label>
        <label>模型名称<input name="model" required placeholder="gpt-4o-mini"></label>
        <div class="two-col">
          <label>温度<input name="temperature" type="number" min="0" max="2" step="0.05"></label>
          <label>最大 Tokens<input name="max_tokens" type="number" min="256" step="256"></label>
        </div>
      </div>
      <div class="dialog-actions">
        <span class="dialog-note"><i data-lucide="database"></i>配置保存在本机 SQLite</span>
        <button type="button" class="btn secondary" id="testModel">测试连接</button>
        <button type="submit" class="btn primary">保存配置</button>
      </div>
    </form>
  </dialog>

  <dialog id="deriveDialog" class="dialog derive-dialog">
    <form method="dialog" class="dialog-panel" id="deriveForm">
      <div class="dialog-head">
        <div><h2>衍生创作</h2><p id="deriveSourceLabel"></p></div>
        <button type="button" class="icon-btn" id="closeDerive" title="关闭"><i data-lucide="x"></i></button>
      </div>
      <div class="mode-segment" role="radiogroup" aria-label="衍生模式">
        <label class="mode-option"><input type="radio" name="mode" value="sequel"><span><i data-lucide="book-plus"></i>写后续</span></label>
        <label class="mode-option"><input type="radio" name="mode" value="template"><span><i data-lucide="copy-plus"></i>复用模板</span></label>
      </div>
      <p class="derive-mode-note" id="deriveModeNote"></p>
      <div class="form-grid">
        <label>新书名<input name="title" required maxlength="80"></label>
        <label>类型<input name="genre" required maxlength="50"></label>
        <label class="full">新主题<input name="theme" required maxlength="300"></label>
        <label>章节数<input name="chapter_count" type="number" required min="1" max="1000"></label>
        <label>每章字数<input name="words_per_chapter" type="number" required min="500" max="10000" step="100"></label>
        <label class="full">文风<input name="style"></label>
        <label class="full">补充或修改设定
          <textarea name="extra_prompt" maxlength="10000" placeholder="可修改人物、背景、关系或新故事方向"></textarea>
        </label>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn secondary" id="cancelDerive">取消</button>
        <button type="submit" class="btn primary"><i data-lucide="plus"></i>创建新作品</button>
      </div>
    </form>
  </dialog>

  <dialog id="replanDialog" class="dialog">
    <form method="dialog" class="dialog-panel" id="replanForm">
      <div class="dialog-head">
        <div><h2>重规划后续</h2><p id="replanProjectLabel"></p></div>
        <button type="button" class="icon-btn" id="closeReplan" title="关闭"><i data-lucide="x"></i></button>
      </div>
      <div class="form-grid">
        <label>从哪一章开始<select name="start_chapter" required></select></label>
        <label>新的总章数<input name="chapter_count" type="number" required min="1" max="1000"></label>
        <label class="full">后续调整要求
          <textarea name="instruction" required maxlength="5000" placeholder="例如：从这里转为双线调查，保留前文伏笔；增加一名与主角立场相反的新角色，并在第18章前完成第一次正面冲突。"></textarea>
        </label>
      </div>
      <div class="impact-warning"><i data-lucide="triangle-alert"></i><span id="replanWarning"></span></div>
      <div class="dialog-actions">
        <button type="button" class="btn secondary" id="cancelReplan">取消</button>
        <button type="submit" class="btn primary"><i data-lucide="refresh-cw"></i>重新生成后续大纲</button>
      </div>
    </form>
  </dialog>

  <div class="toast-stack" id="toasts"></div>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
