# main 分支每次 push 后自动测试、启动检查并发布 Docker 镜像。
main:
  push:
    - name: 测试并发布小说生成器
      docker:
        image: node:22-bookworm
        volumes:
          - /root/.npm
      services:
        - docker
      stages:
        - name: 安装依赖
          script: npm ci

        - name: 执行自动化测试
          script: npm test

        - name: 启动应用并检查健康状态
          script: |
            DATABASE_PATH=/tmp/xiaoshuo-ci.db PORT=3000 node server/index.js > /tmp/xiaoshuo.log 2>&1 &
            APP_PID=$!
            trap 'kill $APP_PID 2>/dev/null || true' EXIT
            node -e "(async()=>{for(let i=0;i<30;i++){try{const r=await fetch('http://127.0.0.1:3000/api/health');if(r.ok){console.log('应用启动成功');process.exit(0)}}catch{}await new Promise(r=>setTimeout(r,1000))}process.exit(1)})()"
            kill $APP_PID
            trap - EXIT

        - name: 登录 CNB Docker 制品库
          script: |
            printf '%s' "${CNB_TOKEN}" | docker login \
              --username "${CNB_TOKEN_USER_NAME}" \
              --password-stdin \
              "${CNB_DOCKER_REGISTRY}"

        - name: 构建 Docker 镜像
          script: |
            docker build \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT} \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
              .

        - name: 推送 Docker 镜像
          script: |
            for TAG in "${CNB_COMMIT_SHORT}" latest; do
              for ATTEMPT in 1 2 3; do
                docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${TAG} && break
                if [ "$ATTEMPT" = "3" ]; then exit 1; fi
                sleep $((ATTEMPT * 2))
              done
            done

# 更多资料见 https://docs.cnb.cool/zh/build/quick-start.html

# 点击“云原生开发”后直接启动应用并打开网页预览。
$:
  web_trigger_vscode:
    - name: 打开小说生成器开发环境
      docker:
        image: node:22-bookworm
      runner:
        tags: cnb:arch:amd64
        cpus: 2
      services:
        - name: vscode
          options:
            launch: npm ci && PORT=8686 npm start
            keepAliveTimeout: 1h
            daemon: true
            backup: true
      stages:
        - name: 检查 Node 环境
          script: node --version

  vscode:
    - name: 直接预览小说生成器
      docker:
        image: node:22-bookworm
      runner:
        tags: cnb:arch:amd64
        cpus: 2
      services:
        - name: vscode
          options:
            onlyPreview: true
            launch: npm ci && PORT=8686 npm start
            keepAliveTimeout: 1h
            daemon: true
            backup: true
      stages:
        - name: 检查 Node 环境
          script: node --version
